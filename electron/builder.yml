appId: com.vlsitracker.app
productName: VLSI Tracker
directories:
  output: release
files:
  - build/**/*
  - electron/**/*
  - "!node_modules/.cache/**/*"
extraResources:
  - from: "public/"
    to: "public/"
win:
  target:
    - nsis
  icon: public/icon.png
  artifactName: "${productName}-${version}-Setup.${ext}"
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
mac:
  target:
    - dmg
  icon: public/icon.png
linux:
  target:
    - AppImage
  icon: public/icon.png
